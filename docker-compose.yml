version: '3.8'

services:
  chatbot-web:
    build: .
    container_name: chatbotvoice-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount the sqlite DB and intents to persist data across container restarts
      - ./users.db:/app/users.db
      - ./data:/app/data
    environment:
      - SQLALCHEMY_DATABASE_URI=sqlite:///users.db
